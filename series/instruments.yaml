      ecb:
        code: "BLS.Q.ES.ALL.MAL.H.H.B3.TC.S.FNET"
        unit: PCT

  BLS_TC_MRL:
    display_name: "BLS TC det.: margen préstamos más arriesgados"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.MRL.H.H.B3.TC.S.FNET"
        unit: PCT

  BLS_TC_OF1:
    display_name: "BLS TC det.: otros factores"
    providers:
      ecb:
