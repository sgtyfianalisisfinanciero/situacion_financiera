    providers:
      ecb:
        code: "BLS.Q.ES.ALL.LP.H.H.B3.ST.S.FNET"
        unit: PCT

  BLS_STD_BC:
    display_name: "BLS std det.: competencia bancaria"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.BC.H.H.B3.ST.S.FNET"
        unit: PCT

  BLS_STD_NBC:
    display_name: "BLS std det.: competencia no bancaria"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.NBC.H.H.B3.ST.S.FNET"
