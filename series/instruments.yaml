  # Encuesta de préstamos bancarios. España, préstamos a
  # hogares para adquisición de vivienda. Todas las series
  # usan BLS_AGG_METHOD=FNET (net percentage of banks).

  BLS_STD_VIV:
    display_name: "BLS estándares de crédito vivienda"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.Z.H.H.B3.ST.S.FNET"
        unit: PCT

  BLS_DMD_VIV:
    display_name: "BLS demanda de crédito vivienda"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.Z.H.H.B3.ZZ.D.FNET"
