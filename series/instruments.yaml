        unit: PCT

  # "Otras fuentes de financiación" del boletín se
  # construye como AVERAGE(IFS, LOB, OSF), siguiendo la
  # metodología del informe original (ver
  # BLS y CES/BLS/4T2025 - BLS.xlsx, hoja "Demanda
  # vivienda", fórmula `=AVERAGE(E:G)`).

  BLS_DMD_IFS:
    display_name: "BLS det.: financiación interna / ahorro"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.IFS.H.H.B3.ZZ.D.FNET"
