  # gráfico de líneas, y determinantes para el apilado.

  BLS_STD_CONS:
    display_name: "BLS estándares crédito consumo"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.Z.H.C.B3.ST.S.FNET"
        unit: PCT

  BLS_DMD_CONS:
    display_name: "BLS demanda crédito consumo"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.Z.H.C.B3.ZZ.D.FNET"
