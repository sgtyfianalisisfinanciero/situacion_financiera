# Instrument catalog for the hogares project.
#
# Same schema as diariospython/instruments.yaml:
#   - Canonical ID (key)
#   - display_name: human-readable label
#   - providers.bde.code: BdE API series code
#   - providers.bde.unit: unit as returned by the API
#       K_EUR  = thousands of euros
#       M_EUR  = millions of euros
#       BN_EUR = billions of euros (miles de millones)
#       PCT    = percentage points

