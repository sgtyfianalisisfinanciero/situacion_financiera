    providers:
      ecb:
        code: "BLS.Q.ES.ALL.OSF.H.H.B3.ZZ.D.FNET"
        unit: PCT

  # --- Determinantes de los estándares de crédito (vivienda) ---
  # Las 3 agrupaciones del boletín (Coste/Competencia/
  # Percepción) son AVERAGEs de los subcomponentes.
  # Tolerancia al riesgo (RTO) y Otros factores (OF1) van
  # directos. Estas series existen desde ~2022.

  BLS_STD_CP:
    display_name: "BLS std det.: capital position"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.CP.H.H.B3.ST.S.FNET"
