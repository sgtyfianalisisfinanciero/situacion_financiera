    providers:
      ecb:
        code: "BLS.Q.ES.ALL.CCF.H.C.B3.ZZ.D.FNET"
        unit: PCT

  BLS_DMD_C_GLI:
    display_name: "BLS det. consumo: nivel gral. tipos de interés"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.GLI.H.C.B3.ZZ.D.FNET"
        unit: PCT

  BLS_DMD_C_CRE:
    display_name: "BLS det. consumo: Real Estate"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.CRE.H.C.B3.ZZ.D.FNET"
        unit: PCT

  BLS_DMD_C_IFS:
    display_name: "BLS det. consumo: financ. interna / ahorro"
    providers:
      ecb:
        code: "BLS.Q.ES.ALL.IFS.H.C.B3.ZZ.D.FNET"
