# Chart definitions for the hogares report.
#
# Each key becomes the PNG filename ({key}.png).
# Types: line (tesorotools LinePlot), stacked_area, stacked_bar (local).
#
# series: mapping of column name -> display label.
# format: units + decimals for axis labels.
# scale: multiplier applied to data before plotting (e.g. 100 for ratio->%).
# start_date: ISO date string for the left edge of the chart.

charts:

  # --------------------------------------------------
  # Macro / cuentas financieras
  # --------------------------------------------------

  cap_nec_financiacion:
    type: line
    title: "Capacidad/necesidad de financiacion de hogares"
    subtitle: "Porcentaje sobre la renta bruta disponible"
    source: "Fuente: INE y Banco de Espana"
    series:
      CAP_NEC_FINANCIACION: "Cap./nec. financiacion"
    format: { units: "%", decimals: 1 }
    start_date: "2000-01-01"
    baseline: true

  ahorro_bruto:
    type: line
    title: "Evolucion del ahorro bruto de los hogares"
    subtitle: "Porcentaje sobre la RBD. Acumulado 4 trimestres"
    source: "Fuente: INE y Banco de Espana"
    series:
      AHORRO_BRUTO: "Ahorro bruto"
    format: { units: "%", decimals: 1 }
    start_date: "2000-01-01"

  vna_componentes:
    type: stacked_bar
    title: "Variacion neta de activos"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      CF_VAR_EFECTIVO_BN: "Efectivo y depositos"
      CF_VAR_VALORES_BN: "Valores de deuda"
      CF_VAR_ACCIONES_BN: "Acciones"
      CF_VAR_FONDOS_BN: "Fondos de inversion"
      CF_VAR_SEGUROS_BN: "Seguros y pensiones"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"
    baseline: true

  vnp_componentes:
    type: stacked_bar
    title: "Variacion neta de pasivos"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      CF_VAR_PRESTAMOS_BN: "Prestamos"
      CF_VAR_CRED_COMERCIALES_BN: "Creditos comerciales"
      CF_VAR_OTROS_PASIVOS_BN: "Otros pasivos"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"
    baseline: true

  activos_stock:
    type: line
    title: "Activos financieros de los hogares"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      CF_EFECTIVO_DEPOSITOS_BN: "Efectivo y depositos"
      CF_VALORES_DEUDA_BN: "Valores de deuda"
      CF_PARTICIPACIONES_BN: "Participaciones y FI"
      CF_SEGUROS_BN: "Seguros y pensiones"
      CF_OTROS_Y_PRESTAMOS_BN: "Otros + prestamos"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"
    legend: { ncol: 3 }

  activos_composicion:
    type: stacked_area
    title: "Activos financieros sobre activos totales"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de Espana"
    series:
      CF_PCT_EFECTIVO: "Efectivo y depositos"
      CF_PCT_VALORES: "Valores de deuda"
      CF_PCT_PARTICIPACIONES: "Participaciones y FI"
      CF_PCT_SEGUROS: "Seguros y pensiones"
      CF_PCT_OTROS: "Otros + prestamos"
    format: { units: "%", decimals: 0 }
    scale: 100
    start_date: "2015-01-01"
    legend: { ncol: 3 }

  deuda_pib:
    type: line
    title: "Deuda de los hogares"
    subtitle: "Porcentaje sobre el PIB"
    source: "Fuente: Banco de Espana"
    series:
      CF_DEUDA_PIB: "Deuda / PIB"
    format: { units: "%", decimals: 0 }
    start_date: "2000-01-01"

  deuda_hogares_yoy:
    type: line
    title: "Variacion de la deuda de hogares"
    subtitle: "Porcentaje interanual"
    source: "Fuente: Banco de Espana"
    series:
      CF_DEUDA_HOGARES_YOY: "Deuda hogares"
    format: { units: "%", decimals: 1 }
    scale: 100
    start_date: "2015-01-01"
    baseline: true

  riqueza_neta:
    type: line
    title: "Riqueza financiera neta de los hogares"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      CF_RIQUEZA_NETA_BN: "Riqueza neta"
    format: { units: "", decimals: 0 }
    start_date: "2000-01-01"

  # --------------------------------------------------
  # Stock de credito
  # --------------------------------------------------

  stock_credito_yoy:
    type: line
    title: "Tasa de variacion interanual del stock de credito a hogares"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de Espana"
    series:
      STOCK_PRESTAMOS_YOY: "Total"
      STOCK_VIVIENDA_YOY: "Vivienda"
      STOCK_CONSUMO_YOY: "Consumo"
      STOCK_OTROS_YOY: "Otros fines"
    format: { units: "%", decimals: 1 }
    scale: 100
    start_date: "2015-01-01"
    baseline: true
    legend: { ncol: 4 }

  # --------------------------------------------------
  # Flujos de credito
  # --------------------------------------------------

  flujos_credito:
    type: line
    title: "Nuevos flujos de credito a hogares"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      FLUJOS_HIPOTECARIO_CON_RENEG_BN: "Hipotecario (con reneg.)"
      FLUJOS_CONSUMO_BN: "Consumo"
      FLUJOS_OTROS_BN: "Otros fines"
    format: { units: "", decimals: 1 }
    start_date: "2015-01-01"
    legend: { ncol: 3 }

  renegociaciones:
    type: line
    title: "Renegociaciones del credito a la vivienda"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de Espana"
    series:
      RENEGOCIACIONES: "Renegociaciones"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"

  # --------------------------------------------------
  # Tipos de interes
  # --------------------------------------------------

  ti_stock:
    type: line
    title: "Tipo de interes del stock de credito"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de Espana"
    series:
      TI_STOCK_VIVIENDA: "Adquisicion vivienda"
      TI_STOCK_CONSUMO: "Consumo y otros"
    format: { units: "%", decimals: 2 }
    start_date: "2015-01-01"
    legend: { ncol: 2 }

  tedr_flujos:
    type: line
    title: "Tipo de interes de los nuevos flujos de credito"
    subtitle: "Tipo medio ponderado TEDR"
    source: "Fuente: Banco de Espana"
    series:
      TEDR_VIVIENDA: "Vivienda"
      TEDR_CONSUMO: "Consumo"
      TEDR_OTROS: "Otros fines"
    format: { units: "%", decimals: 2 }
    start_date: "2015-01-01"
    legend: { ncol: 3 }

  tedr_vivienda_tipo:
    type: line
    title: "Tipos de interes nuevas operaciones de credito a la vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de Espana"
    series:
      TEDR_VARIABLE: "Variable"
      TEDR_FIJO: "Fijo"
      TEDR_MIXTO_1_5: "Mixto 1-5 anios"
      TEDR_MIXTO_5_10: "Mixto 5-10 anios"
    format: { units: "%", decimals: 2 }
    start_date: "2015-01-01"
    legend: { ncol: 4 }

  tedr_renegociaciones:
    type: line
    title: "TEDR de las renegociaciones de credito para vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de Espana"
    series:
      TEDR_RENEG_VIVIENDA: "Renegociaciones"
      TEDR_VIVIENDA_SIN_RENEG: "Sin renegociaciones"
    format: { units: "%", decimals: 2 }
    start_date: "2015-01-01"
    legend: { ncol: 2 }