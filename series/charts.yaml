# Definiciones de gráficos para el informe de hogares.
#
# Cada clave se convierte en el nombre del PNG ({clave}.png).
# Tipos: line (tesorotools LinePlot), stacked_area, stacked_bar.
#
# series: mapeo columna -> etiqueta de leyenda.
# format: unidades + decimales para los ejes.
# scale: multiplicador sobre los datos (ej. 100 para ratio -> %).
# start_date: fecha ISO del borde izquierdo del gráfico.

charts:

  # --------------------------------------------------
  # Macro / cuentas financieras
  # --------------------------------------------------

  cap_nec_financiacion:
    type: line
    title: "Capacidad/necesidad de financiación de hogares"
    subtitle: "Porcentaje sobre la renta bruta disponible"
    source: "Fuente: INE y Banco de España"
    series:
      CAP_NEC_FINANCIACION: "Cap./nec. financiación"
    format: { units: "%", decimals: 1 }
    start_date: "2000-01-01"
    baseline: true

  ahorro_bruto:
    type: line
    title: "Evolución del ahorro bruto de los hogares"
    subtitle: "Porcentaje sobre la RBD. Acumulado 4 trimestres"
    source: "Fuente: INE y Banco de España"
    series:
      AHORRO_BRUTO: "Ahorro bruto"
    series_styles:
      "Ahorro bruto": { color: "C1" }
    format: { units: "%", decimals: 1 }
    start_date: "2000-01-01"

  vna_descomp:
    type: stacked_bar
    title: "Variación activos financieros"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    resample: annual_recent
    series:
      CF_VNA_4Q: "Adq. netas"
      CF_REVAL_ACTIVO_4Q: "Revalorización y otras var."
    overlay_series:
      CF_TOTAL_ACTIVO_BN_DELTA_4Q: "Total"
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "2014-01-01"
    baseline: true
    legend: { ncol: 3, sep: -0.25 }

  vnp_descomp:
    type: stacked_bar
    title: "Variación pasivos financieros"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    resample: annual_recent
    series:
      CF_VAR_PRESTAMOS_4Q: "Préstamos"
      CF_REVAL_PRESTAMOS_4Q: "Revalorización y otras var."
    overlay_series:
      CF_DEUDA_HOGARES_BN_DELTA_4Q: "Total"
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "2014-01-01"
    baseline: true
    legend: { ncol: 3, sep: -0.25 }

  activos_stock:
    type: stacked_bar
    title: "Activos financieros de los hogares"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      CF_EFECTIVO_DEPOSITOS_BN: "Efectivo"
      CF_VALORES_DEUDA_BN: "Valores deuda"
      CF_PARTICIPACIONES_BN: "Participaciones y FI"
      CF_SEGUROS_BN: "Seguros y pensiones"
      CF_OTROS_Y_PRESTAMOS_BN: "Otros"
    overlay_series:
      CF_TOTAL_ACTIVO_BN: "Activo total"
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "1999-01-01"
    baseline: false
    bar_width: 1.0
    x_rotation: 45
    legend: { ncol: 3, sep: -0.18 }

  activos_composicion:
    type: stacked_area
    title: "Activos sobre activos totales"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      CF_PCT_EFECTIVO: "Efectivo"
      CF_PCT_VALORES: "Valores deuda"
      CF_PCT_PARTICIPACIONES: "Participaciones y FI"
      CF_PCT_SEGUROS: "Seguros y pensiones"
      CF_PCT_OTROS: "Otros"
    format: { units: "%", decimals: 0 }
    scale: 100
    start_date: "1999-01-01"
    legend: { ncol: 3, sep: -0.22 }

  deuda_pib:
    type: line
    title: "Deuda de los hogares"
    subtitle: "Porcentaje sobre el PIB"
    source: "Fuente: Banco de España"
    series:
      CF_DEUDA_PIB: "Deuda / PIB"
    format: { units: "%", decimals: 0 }
    start_date: "2001-09-01"

  flujos_activos:
    type: line
    title: "Flujos de activos financieros"
    subtitle: "Millones de euros. Acum. 4 trimestres"
    source: "Fuente: Banco de España"
    series:
      CF_VNA_4Q: "Total"
      CF_VAR_EFECTIVO_4Q: "Efectivo"
      CF_VAR_VALORES_4Q: "Valores deuda"
      CF_VAR_ACCIONES_4Q: "Acciones"
      CF_VAR_FONDOS_4Q: "Fondos inv."
      CF_VAR_SEGUROS_4Q: "Seguros"
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "2019-09-01"
    baseline: true
    legend: { ncol: 3, sep: -0.22 }

  flujos_pasivos:
    type: line
    title: "Flujos de pasivos financieros"
    subtitle: "Millones de euros. Acumulado 4 trimestres"
    source: "Fuente: Banco de España"
    series:
      CF_VAR_PRESTAMOS_4Q: "Préstamos"
      CF_VAR_CRED_COMERCIALES_4Q: "Créditos comerciales"
      CF_VAR_OTROS_PASIVOS_4Q: "Otros pasivos"
      CF_VNP_4Q: "Total"
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "2019-03-01"
    baseline: true
    legend: { ncol: 2, sep: -0.22 }

  deuda_pib_variacion:
    type: stacked_bar
    title: "Variación de la deuda de hogares y contribuciones"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      DEUDA_PIB_VAR_DEUDA: "Deuda"
      DEUDA_PIB_VAR_PIB: "PIB"
    overlay_series:
      DEUDA_PIB_VAR_TOTAL: "Total"
    format: { units: "%", decimals: 1 }
    start_date: "2018-06-01"
    baseline: true
    x_rotation: 45
    legend: { ncol: 3 }

  deuda_hogares_yoy:
    type: line
    title: "Variación de la deuda de hogares"
    subtitle: "Porcentaje interanual"
    source: "Fuente: Banco de España"
    series:
      CF_DEUDA_HOGARES_YOY: "Deuda hogares"
    format: { units: "%", decimals: 1 }
    scale: 100
    start_date: "2015-01-01"
    baseline: true

  riqueza_neta:
    type: line
    title: "Riqueza financiera neta de los hogares"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de España"
    series:
      CF_RIQUEZA_NETA_BN: "Riqueza neta"
    format: { units: "", decimals: 0 }
    start_date: "2000-01-01"

  # --------------------------------------------------
  # Dudosidad
  # --------------------------------------------------

  dudosidad:
    type: line
    title: "Ratios de dudosidad de la financiación a hogares"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      DUDOSIDAD_HOGARES: "Total hogares"
      DUDOSIDAD_VIVIENDA: "Vivienda"
      DUDOSIDAD_CONSUMO: "Consumo"
    format: { units: "%", decimals: 1 }
    scale: 100
    start_date: "2008-01-01"
    legend: { ncol: 3 }

  # --------------------------------------------------
  # Stock de crédito
  # --------------------------------------------------

  stock_credito_yoy:
    type: line
    title: "Tasa de variación interanual del stock de crédito a hogares"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      STOCK_PRESTAMOS_YOY: "Total"
      STOCK_VIVIENDA_YOY: "Vivienda"
      STOCK_CONSUMO_YOY: "Consumo"
    format: { units: "%", decimals: 1 }
    scale: 100
    start_date: "2007-09-01"
    baseline: true
    legend: { ncol: 3 }

  # --------------------------------------------------
  # Flujos de crédito
  # --------------------------------------------------

  flujos_credito:
    type: line
    title: "Nuevos flujos de crédito a hogares"
    subtitle: "Miles de millones de euros"
    source: "Fuente: Banco de España"
    series:
      FLUJOS_HIPOTECARIO_CON_RENEG_BN: "Hipotecario (con reneg.)"
      FLUJOS_CONSUMO_BN: "Consumo"
      FLUJOS_OTROS_BN: "Otros fines"
    format: { units: "", decimals: 1 }
    start_date: "2015-01-01"
    legend: { ncol: 3 }

  flujos_credito_yoy:
    type: line
    title: "Tasa de variación interanual de los nuevos flujos de crédito a hogares"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      FLUJOS_TOTAL_YOY: "Total"
      FLUJOS_HIPOTECARIO_YOY: "Vivienda"
      FLUJOS_CONSUMO_YOY: "Consumo"
    format: { units: "%", decimals: 0 }
    scale: 100
    start_date: "2022-12-01"
    baseline: true
    legend: { ncol: 3 }

  renegociaciones_type_curve:
    type: type_curve
    title: "Renegociaciones acumuladas del crédito para vivienda"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      RENEGOCIACIONES: "Renegociaciones"
    cumulative: true
    start_year: 2015
    format: { units: "", decimals: 0 }
    legend: { ncol: 4, sep: -0.28 }

  hipotecas_tipo_volumen:
    type: line
    title: "Volumen nuevas hipotecas por tipo"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      FLUJOS_HIPOT_1A: "Variable"
      FLUJOS_HIPOT_MIXTO: "Mixto"
      FLUJOS_HIPOT_10A: "Fijo"
    format: { units: "", decimals: 0 }
    start_date: "2018-10-01"
    legend: { ncol: 3 }

  hipotecas_tipo_proporcion:
    type: line
    title: "Proporción nuevas hipotecas por tipo"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      HIPOT_PCT_VARIABLE: "Variable"
      HIPOT_PCT_MIXTO: "Mixto"
      HIPOT_PCT_FIJO: "Fijo"
    format: { units: "%", decimals: 0 }
    scale: 100
    start_date: "2007-10-01"
    legend: { ncol: 3 }

  amortizaciones:
    type: line
    title: "Amortizaciones de crédito hipotecario"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      AMORTIZACIONES_VIVIENDA: "Amortizaciones"
      AMORT_MA12: "Media móvil 12m"
    series_styles:
      "Media móvil 12m": { linestyle: "--", linewidth: 1 }
    format: { units: "", decimals: 0 }
    scale: 1000
    start_date: "2019-03-01"
    legend: { ncol: 2 }

  renegociaciones_acum:
    type: line
    title: "Renegociaciones acumuladas del crédito para vivienda"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      RENEGOCIACIONES_ACUM: "Renegociaciones acumuladas"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"

  renegociaciones:
    type: line
    title: "Renegociaciones del crédito a la vivienda"
    subtitle: "Millones de euros"
    source: "Fuente: Banco de España"
    series:
      RENEGOCIACIONES: "Renegociaciones"
    format: { units: "", decimals: 0 }
    start_date: "2015-01-01"

  # --------------------------------------------------
  # Tipos de interés
  # --------------------------------------------------

  ti_stock:
    type: line
    title: "Tipo de interés del stock de crédito"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      TI_STOCK_VIVIENDA: "Stock adquisición de vivienda"
      TI_STOCK_CONSUMO: "Stock consumo y otros fines"
    format: { units: "%", decimals: 2 }
    start_date: "2003-10-01"
    legend: { ncol: 2 }

  tedr_flujos:
    type: line
    title: "Tipo de interés de los nuevos flujos de crédito"
    subtitle: "Tipo medio ponderado TEDR"
    source: "Fuente: Banco de España"
    series:
      TEDR_VIVIENDA: "Adquisición de vivienda"
      TEDR_CONSUMO: "Consumo"
    format: { units: "%", decimals: 2 }
    start_date: "2003-10-01"
    legend: { ncol: 2 }

  tedr_vivienda_tipo:
    type: line
    title: "Tipos de interés nuevas operaciones de crédito a la vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      TEDR_VARIABLE: "Variable"
      TEDR_MIXTO_1_5: "Mixto"
      TEDR_FIJO: "Fijo"
    format: { units: "%", decimals: 1 }
    start_date: "2020-04-01"
    legend: { ncol: 3 }

  # --------------------------------------------------
  # Encuesta de préstamos bancarios (BLS, BCE)
  # --------------------------------------------------

  bls_demanda_vivienda:
    type: line
    title: "Cambios en la demanda, términos y condiciones y estándares de crédito para adquisición de vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_STD_VIV: "Estándares de crédito"
      BLS_DMD_VIV: "Demanda"
      BLS_TC_VIV: "Términos y condiciones"
      _BLS_STD_VIV_FCST: "_std_fcst"
      _BLS_DMD_VIV_FCST: "_dmd_fcst"
    series_styles:
      "Estándares de crédito": { color: "C0" }
      "Demanda": { color: "C1" }
      "Términos y condiciones": { color: "C2" }
      "_std_fcst": { color: "C0", linestyle: "--" }
      "_dmd_fcst": { color: "C1", linestyle: "--" }
    forecast_bridges:
      _BLS_STD_VIV_FCST:
        realized: BLS_STD_VIV
        forecast: BLS_STD_VIV_F3
      _BLS_DMD_VIV_FCST:
        realized: BLS_DMD_VIV
        forecast: BLS_DMD_VIV_F3
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    legend: { ncol: 3 }

  bls_determinantes_vivienda:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes de los cambios de la demanda de crédito para adquisición de vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_DMD_HMP: "Perspectivas del mercado de la vivienda"
      BLS_DMD_CCF: "Confianza consumidores"
      BLS_DMD_GLI: "Nivel general de tipos de interés"
      BLS_DMD_OTROS: "Otras fuentes de financiación"
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.28 }

  bls_determinantes_estandares:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes evolución estándares de crédito aplicados a préstamos para adquisición de vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_STD_RTO: "Tolerancia al riesgo de los bancos"
      BLS_STD_OF1: "Otros factores"
      BLS_STD_COSTE: "Coste de los fondos y restricciones de balance"
      BLS_STD_COMPET: "Competencia"
      BLS_STD_PERCEP: "Percepción del riesgo"
    format: { units: "", decimals: 0 }
    start_date: "2022-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.35 }

  bls_determinantes_tc:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes evolución términos y condiciones préstamos para adquisición de vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_TC_MAL: "Margen préstamos promedio"
      BLS_TC_MRL: "Margen préstamos más arriesgados"
      BLS_TC_OF1: "Otros factores"
      BLS_TC_BLR: "Tipo de interés de los préstamos"
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.30 }

  bls_demanda_consumo:
    type: line
    title: "Cambios en la demanda, términos y condiciones y estándares de crédito al consumo"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_STD_CONS: "Estándares de crédito"
      BLS_DMD_CONS: "Demanda"
      BLS_TC_CONS: "Términos y condiciones"
      _BLS_STD_CONS_FCST: "_std_cons_fcst"
      _BLS_DMD_CONS_FCST: "_dmd_cons_fcst"
    series_styles:
      "Estándares de crédito": { color: "C0" }
      "Demanda": { color: "C1" }
      "Términos y condiciones": { color: "C2" }
      "_std_cons_fcst": { color: "C0", linestyle: "--" }
      "_dmd_cons_fcst": { color: "C1", linestyle: "--" }
    forecast_bridges:
      _BLS_STD_CONS_FCST:
        realized: BLS_STD_CONS
        forecast: BLS_STD_CONS_F3
      _BLS_DMD_CONS_FCST:
        realized: BLS_DMD_CONS
        forecast: BLS_DMD_CONS_F3
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    legend: { ncol: 3 }

  bls_determinantes_consumo:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes de la evolución de la demanda de crédito al consumo"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_DMD_C_SDC: "Gasto en consumo de bienes duraderos"
      BLS_DMD_C_CCF: "Confianza consumidores"
      BLS_DMD_C_GLI: "Nivel general de tipos de interés"
      BLS_DMD_C_CRE: "Real Estate"
      BLS_DMD_C_OF1: "Otros factores"
      BLS_DMD_C_USO_ALT: "Uso financiación alternativa"
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.35 }

  bls_determinantes_estandares_consumo:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes evolución estándares de crédito aplicados a préstamos al consumo"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_STDC_COSTE: "Coste de fondos y restricciones de balance"
      BLS_STDC_RTO: "Tolerancia al riesgo de los bancos"
      BLS_STDC_PERCEP: "Percepción del riesgo"
      BLS_STDC_COMPET: "Competencia"
      BLS_STDC_OF1: "Otros factores"
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.35 }

  ces_ingresos_gastos:
    type: line
    title: "Expectativas en la variación de los ingresos netos medios de los hogares y del gasto medio a 12 meses vista"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo (Encuesta de expectativas de los consumidores)"
    series:
      CES_INGRESOS: "Ingresos"
      CES_GASTOS: "Gastos"
    series_styles:
      "Ingresos": { color: "C0" }
      "Gastos": { color: "C1" }
    format: { units: "", decimals: 1 }
    start_date: "2022-04-01"
    baseline: false
    legend: { ncol: 2 }

  ces_credito_pedido:
    type: line
    title: "Han pedido algún tipo de crédito en los tres meses previos"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo (Encuesta de expectativas de los consumidores)"
    series:
      CES_CREDITO_PEDIDO: "% ha pedido crédito"
    format: { units: "", decimals: 0 }
    start_date: "2022-04-01"
    baseline: false

  bls_solicitudes_rechazadas:
    type: line
    title: "Solicitudes de préstamos rechazadas"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_RECH_VIV: "Vivienda"
      BLS_RECH_CONS: "Consumo"
    series_styles:
      "Vivienda": { color: "C0" }
      "Consumo": { color: "C1" }
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    legend: { ncol: 2 }

  bls_determinantes_tc_consumo:
    type: stacked_bar
    resample: quarterly
    title: "Determinantes evolución términos y condiciones préstamos al consumo"
    subtitle: "Porcentaje"
    source: "Fuente: Banco Central Europeo"
    series:
      BLS_TCC_MAL: "Margen préstamos promedio"
      BLS_TCC_MRL: "Margen préstamos más arriesgados"
      BLS_TCC_CRQ: "Requisitos de colateral"
      BLS_TCC_OF1: "Otros factores"
      BLS_TCC_OTROS_TC: "Otros términos y condiciones"
      BLS_TCC_BLR: "Tipo de interés de los préstamos"
    format: { units: "", decimals: 0 }
    start_date: "2021-01-01"
    baseline: true
    bar_width: 0.8
    x_rotation: 45
    legend: { ncol: 2, sep: -0.35 }

  tedr_renegociaciones:
    type: line
    title: "TEDR de las renegociaciones de crédito para vivienda"
    subtitle: "Porcentaje"
    source: "Fuente: Banco de España"
    series:
      TEDR_RENEG_VIVIENDA: "Renegociaciones"
      TEDR_VIVIENDA_SIN_RENEG: "Sin renegociaciones"
    format: { units: "%", decimals: 2 }
    start_date: "2015-01-01"
    legend: { ncol: 2 }