# Plantilla del informe Word de hogares.
#
# Usa los custom tags del TemplateLoader de tesorotools.
# Las rutas en `imports` son relativas a este fichero.

imports:
  image: ../output/charts
  table: ../output/tables

report: !report
  title: !title
    title: "Situación Financiera de los Hogares"

  # --------------------------------------------------
  # Resumen ejecutivo (marcadores para el analista)
  # --------------------------------------------------

  resumen: !section
    title: "Resumen"
    p1: !text
      text: "[INSERTAR COMENTARIO: evolución del crédito hipotecario y al consumo]"
    p2: !text
      text: "[INSERTAR COMENTARIO: tipos de interés y Euríbor]"
    p3: !text
      text: "[INSERTAR COMENTARIO: cuentas financieras y composición de activos]"
    p4: !text
      text: "[INSERTAR COMENTARIO: dudosidad y calidad crediticia]"

  # --------------------------------------------------
  # Gráficos: Cuentas financieras
  # --------------------------------------------------

  cuentas_financieras: !section
    title: "Cuentas financieras"

    row_cf_0: !images
      title: ""
      subtitle: ""
      width: 3
      cap_nec_financiacion.png: !image
        title: "Capacidad/necesidad de financiación"
        subtitle: "Porcentaje sobre la renta bruta disponible"
      ahorro_bruto.png: !image
        title: "Evolución del ahorro bruto"
        subtitle: "Porcentaje sobre la RBD"
    source_cf_0: !text
      text: "Fuente: INE y Banco de España"

    row_cf_2: !images
      title: ""
      subtitle: ""
      width: 3
      activos_stock.png: !image
        title: "Activos financieros de los hogares"
        subtitle: "Millones de euros"
      activos_composicion.png: !image
        title: "Activos sobre activos totales"
        subtitle: "Porcentaje"
    source_cf_2: !text
      text: "Fuente: Banco de España"

    row_cf_3: !images
      title: ""
      subtitle: ""
      width: 3
      deuda_pib.png: !image
        title: "Deuda de los hogares"
        subtitle: "Porcentaje sobre el PIB"
      deuda_pib_variacion.png: !image
        title: "Variación deuda/PIB y contribuciones"
        subtitle: "Porcentaje"
    source_cf_3: !text
      text: "Fuente: Banco de España"

  # --------------------------------------------------
  # Gráficos: Crédito a hogares
  # --------------------------------------------------

  credito: !section
    title: "Crédito a hogares"

    row_cr_0: !images
      title: ""
      subtitle: ""
      width: 3
      stock_credito_yoy.png: !image
        title: "Tasa interanual stock de crédito"
        subtitle: "Porcentaje"
      flujos_credito_yoy.png: !image
        title: "Tasa interanual nuevos flujos"
        subtitle: "Porcentaje"
    source_cr_0: !text
      text: "Fuente: Banco de España"

    row_cr_2: !images
      title: ""
      subtitle: ""
      width: 3
      hipotecas_tipo_volumen.png: !image
        title: "Volumen nuevas hipotecas por tipo"
        subtitle: "Millones de euros"
      hipotecas_tipo_proporcion.png: !image
        title: "Proporción nuevas hipotecas por tipo"
        subtitle: "Porcentaje"
    source_cr_2: !text
      text: "Fuente: Banco de España"

  # --------------------------------------------------
  # Gráficos: Tipos de interés
  # --------------------------------------------------

  tipos: !section
    title: "Tipos de interés"

    row_ti_0: !images
      title: ""
      subtitle: ""
      width: 3
      ti_stock.png: !image
        title: "Tipo de interés del stock"
        subtitle: "Porcentaje"
      tedr_flujos.png: !image
        title: "TEDR nuevos flujos"
        subtitle: "Porcentaje"
    source_ti_0: !text
      text: "Fuente: Banco de España"

    tedr_vivienda_tipo.png: !image
      title: "Tipos nuevas operaciones vivienda"
      subtitle: "Porcentaje"
      width: 5
    source_ti_1: !text
      text: "Fuente: Banco de España"

    row_bls: !images
      title: ""
      subtitle: ""
      width: 3
      bls_demanda_vivienda.png: !image
        title: "Cambios en la demanda, términos y condiciones y estándares de crédito para adquisición de vivienda"
        subtitle: "Porcentaje"
      bls_determinantes_vivienda.png: !image
        title: "Determinantes de los cambios de la demanda de crédito para adquisición de vivienda"
        subtitle: "Porcentaje"
    row_bls_oferta: !images
      title: ""
      subtitle: ""
      width: 3
      bls_determinantes_estandares.png: !image
        title: "Determinantes evolución estándares de crédito aplicados a préstamos para adquisición de vivienda"
        subtitle: "Porcentaje"
      bls_determinantes_tc.png: !image
        title: "Determinantes evolución términos y condiciones préstamos para adquisición de vivienda"
        subtitle: "Porcentaje"
    row_bls_consumo: !images
      title: ""
      subtitle: ""
      width: 3
      bls_demanda_consumo.png: !image
        title: "Cambios en la demanda, términos y condiciones y estándares de crédito al consumo"
        subtitle: "Porcentaje"
      bls_determinantes_consumo.png: !image
        title: "Determinantes de la evolución de la demanda de crédito al consumo"
        subtitle: "Porcentaje"
    row_bls_consumo_oferta: !images
      title: ""
      subtitle: ""
      width: 3
      bls_determinantes_estandares_consumo.png: !image
        title: "Determinantes evolución estándares de crédito aplicados a préstamos al consumo"
        subtitle: "Porcentaje"
      bls_determinantes_tc_consumo.png: !image
        title: "Determinantes evolución términos y condiciones préstamos al consumo"
        subtitle: "Porcentaje"
    bls_solicitudes_rechazadas.png: !image
      title: "Solicitudes de préstamos rechazadas"
      subtitle: "Porcentaje"
      width: 5
    source_bls: !text
      text: "Fuente: Banco Central Europeo"

    row_ces: !images
      title: ""
      subtitle: ""
      width: 3
      ces_ingresos_gastos.png: !image
        title: "Expectativas en la variación de los ingresos netos medios de los hogares y del gasto medio a 12 meses vista"
        subtitle: "Porcentaje"
      ces_credito_pedido.png: !image
        title: "Han pedido algún tipo de crédito en los tres meses previos"
        subtitle: "Porcentaje"
    source_ces: !text
      text: "Fuente: Banco Central Europeo (Encuesta de expectativas de los consumidores, indicadores agregados)"
    note_bls: !text
      text: "Nota: En el segmento de oferta (términos y condiciones y estándares de crédito) porcentaje hace referencia a la diferencia entre el porcentaje bancos que reportan un endurecimiento y un aflojamiento de las condiciones financieras a la hora de realizar la encuesta, de tal manera que los valores positivos indican un endurecimiento. Mientras que en el segmento de demanda porcentaje hace referencia a la diferencia entre el porcentaje de bancos que reportan un aumento y un descenso de la demanda, de tal manera que un valor positivo indicaría un aumento de la demanda de préstamos bancarios. Las columnas apiladas hacen referencia al porcentaje neto de bancos para cada uno de los motivos. La línea discontinua hace referencia a la previsión de los bancos encuestados para el próximo trimestre."

    dudosidad.png: !image
      title: "Ratios de dudosidad de la financiación a hogares"
      subtitle: "Porcentaje"
      width: 5
    source_dud: !text
      text: "Fuente: Banco de España"

  # --------------------------------------------------
  # Otros
  # --------------------------------------------------

  otros: !section
    title: "Otros"

    row_otros_0: !images
      title: ""
      subtitle: ""
      width: 3
      amortizaciones.png: !image
        title: "Amortizaciones de crédito hipotecario"
        subtitle: "Millones de euros"
      renegociaciones.png: !image
        title: "Renegociaciones del crédito a la vivienda"
        subtitle: "Millones de euros"
    source_otros_0: !text
      text: "Fuente: Banco de España"

    row_otros_1: !images
      title: ""
      subtitle: ""
      width: 3
      vna_descomp.png: !image
        title: "Variación activos financieros"
        subtitle: "Millones de euros"
      vnp_descomp.png: !image
        title: "Variación pasivos financieros"
        subtitle: "Millones de euros"
    source_otros_1: !text
      text: "Fuente: Banco de España"

    row_otros_2: !images
      title: ""
      subtitle: ""
      width: 3
      flujos_activos.png: !image
        title: "Flujos de activos financieros"
        subtitle: "Millones de euros. Acum. 4T"
      flujos_pasivos.png: !image
        title: "Flujos de pasivos financieros"
        subtitle: "Millones de euros. Acum. 4T"
    source_otros_2: !text
      text: "Fuente: Banco de España"

    renegociaciones_type_curve.png: !image
      title: "Renegociaciones acumuladas del crédito para vivienda"
      subtitle: "Millones de euros"
      width: 5
    source_otros_3: !text
      text: "Fuente: Banco de España"
